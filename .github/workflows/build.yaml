name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: setup node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20'
    - name: install deps
      run: |
        # install app deps
        npm install
    - name: build
      run: |
        rm dist/index.js
        make
  # make sure 'build' (above) on main is passing too
  main-branch-check:
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Main branch check
      if: always() && github.ref != 'refs/heads/main' 
      # in this one case we don't use hashes, because otherwise we'd get
      # in a never ending cycle of bumping everytime we merge. :) Since it's
      # our own repo there's no security issues here, we're already running
      # our own code in tests.
      uses: jaymzh/main-branch-check-action@main
      with:
        gh_token: ${{ secrets.GITHUB_TOKEN }}
        main_branch: "main"
        workflow_ref: ${{ github.workflow_ref }}
